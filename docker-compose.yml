services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-hello_agents}
      POSTGRES_USER: ${POSTGRES_USER:-hello_agents}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hello_agents}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${POSTGRES_PORT:-55432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hello_agents} -d ${POSTGRES_DB:-hello_agents}"]
      interval: 5s
      timeout: 5s
      retries: 10

  qdrant:
    image: qdrant/qdrant:v1.12.5
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${QDRANT_PORT:-6333}:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  redis:
    image: redis:7-alpine
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    environment:
      APP_NAME: ${APP_NAME:-HelloAgents Learn}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DATABASE_URL: postgresql+psycopg://${POSTGRES_USER:-hello_agents}:${POSTGRES_PASSWORD:-hello_agents}@postgres:5432/${POSTGRES_DB:-hello_agents}
      QDRANT_URL: http://qdrant:6333
      REDIS_URL: redis://redis:6379/0
      STORAGE_ROOT: /app/storage
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:8080,http://localhost:5173}
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${API_PORT:-8000}:8000"
    volumes:
      - ./storage:/app/storage
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_started
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=2)"]
      interval: 5s
      timeout: 3s
      retries: 10

  web:
    build:
      context: ./apps/web
      dockerfile: Dockerfile
    ports:
      - "${BIND_ADDRESS:-127.0.0.1}:${WEB_PORT:-8080}:80"
    depends_on:
      api:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
